<select name="volunteer_type">
<option value="">How would you like to help?</option>
<option value="flyers">Pass Flyers</option>
<option value="yard_sign">Host Yard Sign</option>
<option value="events">Help at Events</option>
</select>

<textarea name="message" placeholder="Additional message"></textarea>

<button class="btn primary">Join the Campaign</button>
</form>
